name: market-dominion

x-app: &app
  image: market-dominion-app:latest
  build:
    context: .
    dockerfile: deploy/Dockerfile
    target: production
  restart: unless-stopped
  env_file: .env.production
  environment:
    NODE_OPTIONS: --max-old-space-size=192
  networks: [internal]
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "5"

services:
  postgres:
    image: postgres:17.10-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: ["postgres", "-c", "shared_buffers=64MB", "-c", "work_mem=2MB", "-c", "maintenance_work_mem=32MB", "-c", "max_connections=30"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - app_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]
    logging:
      driver: json-file
      options: { max-size: 10m, max-file: "5" }

  redis:
    image: redis:8.2.7-bookworm
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "96mb", "--maxmemory-policy", "noeviction"]
    volumes: ["redis_data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]
    logging:
      driver: json-file
      options: { max-size: 10m, max-file: "5" }

  migrate:
    <<: *app
    restart: "no"
    command: ["sh", "-c", "pnpm --filter @market-dominion/database db:migrate && pnpm --filter @market-dominion/database db:seed"]
    depends_on:
      postgres: { condition: service_healthy }

  api:
    <<: *app
    command: ["pnpm", "--filter", "@market-dominion/api", "start"]
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports: ["127.0.0.1:4000:4000"]

  market-engine:
    <<: *app
    command: ["pnpm", "--filter", "@market-dominion/market-engine", "start"]
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "node", "-e", "process.kill(1,0)"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    <<: *app
    command: ["pnpm", "--filter", "@market-dominion/worker", "start"]
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "node", "-e", "process.kill(1,0)"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    <<: *app
    command: ["pnpm", "--filter", "@market-dominion/web", "start", "--hostname", "0.0.0.0"]
    depends_on:
      api: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports: ["127.0.0.1:3000:3000"]

  caddy:
    image: caddy:2.11.4-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-market.wondering.kr}
    network_mode: host
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web: { condition: service_healthy }
      api: { condition: service_healthy }
    logging:
      driver: json-file
      options: { max-size: 10m, max-file: "5" }

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  app_backups:
